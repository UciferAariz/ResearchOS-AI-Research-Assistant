[tool.ruff]
line-length = 100
# Deployment target is Python 3.10 (the AMD ROCm notebook); this stays here so
# ruff flags any 3.11+-only syntax even though mypy can't (see note below).
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
# NOTE: the real deployment target is Python 3.10 (the AMD ROCm notebook), not
# 3.13. mypy *should* be configured with python_version = "3.10" to catch
# version-gated stdlib usage (e.g. datetime.UTC, added in 3.11, broke on the
# notebook despite passing mypy here) — but numpy's bundled stubs use PEP 695
# `type` statement syntax unconditionally, which mypy refuses to parse for any
# target below 3.12, so python_version = "3.10" makes mypy fail outright before
# checking any of our own code. Until numpy fixes this (or we vendor an older
# numpy just for local type-checking), rely on ruff (target-version above) plus
# manual review for stdlib APIs introduced after Python 3.10.
python_version = "3.13"
strict = true
ignore_missing_imports = true

[tool.black]
line-length = 100
target-version = ["py310"]
